# Direct-monitor roster. The triage agent proposes additions/fixes via PR.
# tier: A (marquee) / B (major owners & E&C) / C (specialist consultancies)
# ats: workday | oracle_orc | greenhouse | generic_page
# enabled: true = endpoint live-verified 2026-07-17; false = needs fingerprinting (see note)
# generic_page monitors: URL is fetched and checked for the tier-1 keyword.
#   For search-result URLs, query a DIFFERENT term (Primavera) than the checked
#   keyword (unifier) so the query echo can't false-positive.
companies:
  # ---- Tier A ----
  - name: Meta
    tier: A
    ats: generic_page
    url: https://www.metacareers.com/jobs?q=Primavera
    enabled: false
    note: BLIND — JS app; raw HTML identical for any query and contains a static
      "unifier" string (false trigger). Needs graphql/browser approach.
  - name: Google
    tier: A
    ats: generic_page
    url: https://www.google.com/about/careers/applications/jobs/results?q=%22primavera%22
    enabled: true
  - name: Oracle
    tier: A
    ats: oracle_orc
    url: https://eeho.fa.us2.oraclecloud.com/hcmRestApi/resources/latest/recruitingCEJobRequisitions
    site_number: CX_45001
    enabled: false
    note: endpoint responds but finder returns 0 for any keyword — verify siteNumber/finder syntax
  - name: JLL
    tier: A
