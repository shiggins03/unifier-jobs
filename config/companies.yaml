# Direct-monitor roster. The triage agent proposes additions/fixes via PR.
# tier: A (marquee) / B (major owners & E&C) / C (specialist consultancies)
# ats: workday | oracle_orc | greenhouse | generic_page
# enabled: true = endpoint live-verified 2026-07-17; false = needs fingerprinting (see note)
# generic_page monitors: URL is fetched and checked for the tier-1 keyword.
#   For search-result URLs, query a DIFFERENT term (Primavera) than the checked
#   keyword (unifier) so the query echo can't false-positive.
companies:
  # ---- Tier A ----
  - name: Meta
    tier: A
    ats: meta_graphql
    doc_id: "27807005005556827"
    enabled: true
    note: graphql CPJobSearchSourceQuery, shape captured 2026-07-17; searches
      pipeline keyword + Primavera. doc_id long-lived but may rotate.
  - name: Google
    tier: A
    ats: generic_page
    url: https://www.google.com/about/careers/applications/jobs/results?q=%22primavera%22
    enabled: true
  - name: Oracle
    tier: A
    ats: oracle_orc
    url: https://eeho.fa.us2.oraclecloud.com/hcmRestApi/resources/latest/recruitingCEJobRequisitions
    site_number: CX_45001
    search_query: primavera
    enabled: true
    note: needs expand=all; "unifier" keyword fuzzy-matches whole site so we
      search "primavera" (27 real matches) and let the tier filter decide.
  - name: JLL
    tier: A
    ats: workday
    workday_host: jll.wd1.myworkdayjobs.com
    workday_tenant: jll
    workday_site: jllcareers
    enabled: true
  - name: Accenture
    tier: A
    ats: workday
    workday_host: accenture.wd103.myworkdayjobs.com
    workday_tenant: accenture
    workday_site: AccentureCareers
    enabled: true
    note: cxs API intermittently serves SPA HTML (200) instead of JSON —
      probes 2026-07-18 01:47-01:57 UTC got HTML while the 11:53 daily run got
      JSON. Treat fail_streaks ≤3 as flakiness, not breakage.
  - name: Deloitte
    tier: A
    ats: avature_feed
    feed_url: https://apply.deloitte.com/en_US/careers/SearchJobs/Unifier/feed/?jobRecordsPerPage=25
    enabled: true
  - name: Bechtel
    tier: A
    ats: phenom
    phenom_host: jobs.bechtel.com
    enabled: true

  # ---- Tier B ----
  - name: WSP
    tier: B
    ats: workday
    workday_host: wsp.wd3.myworkdayjobs.com
    workday_tenant: wsp
    workday_site: WSP
    enabled: false
    note: dead end 2026-07-18 — 15 cxs site-name candidates all 422; wsp.com
      careers pages bot-walled (403); wspgroup.dejobs.org mirror is an empty JS
      shell. Site name is only discoverable from a real WSP job link — grab one
      from a discovery hit when aggregator keys are live.
  - name: Burns & McDonnell
    tier: B
    ats: workday
    workday_host: burnsmcd.wd1.myworkdayjobs.com
    workday_tenant: burnsmcd
    workday_site: External
    enabled: false
    note: not on public Workday (all cxs pairs 422; wd1 host is internal-only).
      Real boards checked 2026-07-18 - burnsmcd.jobs is a JS-rendered
      DirectEmployers site and apply.burnsmcd.com is an InFlight SPA overlay;
      neither has a scriptable endpoint. Rely on discovery.
  - name: Turner & Townsend
    tier: B
    ats: smartrecruiters
    smartrecruiters_company: turnertownsend
    enabled: true
    note: careers.turnerandtownsend.com is dead (redirects to a Foleon marketing
      page); real board is SmartRecruiters, public API verified 2026-07-18
      (inventory 2726, 9 unifier hits). Global firm — US filter does real work.
  - name: MTA
    tier: B
    ats: generic_page
    url: https://careers.mta.org/search/unifier/jobs
    enabled: false
    note: 'FINAL (2026-07-20): Cloudflare challenges everything on
      careers.mta.org (even robots.txt/sitemap.xml) and mta.info; the
      jibeapply API hostname does not exist. No legitimate script route —
      their postings syndicate to Google Jobs, so aggregator discovery
      (JSearch) is THE route once keys are added. Do not retry scraping.'
  - name: City of New York
    tier: B
    ats: generic_page
    url: https://cityjobs.nyc.gov/jobs?q=unifier
    check_pattern: href="[^"]*/job/[^"]*unifier
    enabled: true
    note: NYC DDC/DEP/Parks etc. post Unifier admin roles here (live "Unifier
      Coordinator" posting 2026-07-20). Search echoes the query on zero-result
      pages (5x), so the plain keyword check would false-positive — the
      check_pattern only fires when a job-URL slug contains unifier (city
      Unifier roles carry it in the title). Search is NOT full-text (primavera
      query missed the unifier-titled posting), so slug-match is the signal.
  - name: STV
    tier: B
    ats: workday
    workday_host: stvinc.wd5.myworkdayjobs.com
    workday_tenant: stvinc
    workday_site: stv
    enabled: true
    note: NYC-HQ transit/infrastructure firm. cxs verified 2026-07-20
      (inventory 385; unifier search returned 4 incl. a NYC role). Site name
      found via link on stvinc.com/careers — earlier wd1 guesses were wrong host.
  - name: Hill International
    tier: B
    ats: oracle_orc
    url: https://hcib.fa.us2.oraclecloud.com/hcmRestApi/resources/latest/recruitingCEJobRequisitions
    site_number: CX_1001
    job_url_base: https://hcib.fa.us2.oraclecloud.com/hcmUI/CandidateExperience/en/sites/CX_1001/job
    enabled: true
    note: PM/construction-claims firm, heavy PMIS user. ORC endpoint found via
      links on hillintl.com/careers; verified 2026-07-20 (10 unifier-keyword
      reqs, global — US filter does real work).
  - name: Amtrak
    tier: B
    ats: successfactors
    sf_base: https://careers.amtrak.com
    enabled: true
    note: SF Career Site Builder, server-rendered; verified 2026-07-20 (6
      unifier search hits). QUIRK handled by adapter - no-match searches fall
      back to listing ALL jobs, and the page echoes the query (14x), so
      results only count when they differ from a nonsense query's.
  - name: Turner Construction
    tier: B
    ats: generic_page
    url: https://turnerconstruction.csod.com/ux/ats/careersite/1/home?c=turnerconstruction
    enabled: false
    note: Cornerstone (csod.com) SPA, careersites 1-4 — JS-rendered, no
      scriptable endpoint found 2026-07-20. Needs a csod adapter or discovery.
  - name: Port Authority NY/NJ
    tier: B
    ats: workday
    workday_host: panynj.wd1.myworkdayjobs.com
    workday_tenant: panynj
    workday_site: External
    enabled: false
    note: wd1 host exists but 6 site-name candidates all 422 (2026-07-20);
      panynj.gov careers page moved/404. Grab the site name from a real job
      link via discovery.
  - name: NYPA
    tier: B
    ats: workday
    workday_host: nypa.wd1.myworkdayjobs.com
    workday_tenant: nypa
    workday_site: External
    enabled: false
    note: wd1 host exists but 8 site-name candidates all 422 (2026-07-20);
      nypa.gov/careers shows no ATS links to scripts. Site name via discovery.
  - name: LA Metro
    tier: B
    ats: generic_page
    url: https://www.governmentjobs.com/careers/lametro?keywords=unifier
    enabled: false
    note: agency slug is lametro (lacmta redirects to homepage). Page is a
      knockout SPA — listings not in server HTML, keyword check is blind; no
      public JSON/RSS found (jobs.rss 404, legacy agency feeds redirect back).
      Verified 2026-07-18. Rely on discovery.
  - name: MARTA
    tier: B
    ats: generic_page
    url: https://careers-martatransit.icims.com/jobs/search?ss=1&searchKeyword=unifier
    enabled: false
    note: iCIMS portal answers 405 "Human Verification" to scripts;
      itsmarta.com/current-job-openings.aspx has no server-rendered listings
      either (checked 2026-07-18). Rely on discovery.
  - name: BC Hydro
    tier: B
    ats: generic_page
    url: https://www.bchydro.com/careers.html
    enabled: false
    note: Canada — outside US scope; keep for reference only
  - name: Northwell Health
    tier: B
    ats: generic_page
    url: https://jobs.northwell.edu/
    enabled: false
    note: NOT Phenom — WordPress; search form posts to /job-search-results/
      (?keyword=) but that path 403s scripts while the homepage 200s
      (verified 2026-07-18). Rely on discovery.
  - name: Mass General Brigham
    tier: B
    ats: workday
    workday_host: massgeneralbrigham.wd1.myworkdayjobs.com
    workday_tenant: massgeneralbrigham
    workday_site: MGBExternal
    enabled: true
    note: tenant renamed from partners → massgeneralbrigham; cxs verified
      2026-07-18 (total=2000)
  - name: Petrofac
    tier: B
    ats: generic_page
    url: https://careers.petrofac.com/
    enabled: false
    note: careers.petrofac.com cert is misconfigured (hostname mismatch);
      www.petrofac.com/careers works but job pages are India/Lithuania/Oman/UAE
      only — no US board (verified 2026-07-18). Outside US scope; keep for
      reference.
  - name: Linesight
    tier: B
    ats: generic_page
    url: https://www.linesight.com/careers/
    enabled: true
  - name: Wipro
    tier: B
    ats: generic_page
    url: https://careers.wipro.com/
    enabled: false
    note: search URL echoes query (false positives); discovery net covers them

